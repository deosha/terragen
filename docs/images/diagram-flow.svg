<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="1" />
      <stop offset="100%" stop-color="#16213e" stop-opacity="1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bgGrad2)" rx="10"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Architecture Diagram → Terraform Flow</text>

  <!-- Step 1: Upload -->
  <g transform="translate(40, 60)">
    <rect width="140" height="100" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
    <text x="70" y="30" text-anchor="middle" fill="#63b3ed" font-family="system-ui" font-size="24">📤</text>
    <text x="70" y="55" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">1. Upload</text>
    <text x="70" y="72" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">Drag &amp; drop</text>
    <text x="70" y="85" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">architecture diagram</text>
  </g>

  <!-- Arrow -->
  <path d="M185 110 L215 110" stroke="#63b3ed" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <!-- Step 2: Analyze -->
  <g transform="translate(220, 60)">
    <rect width="140" height="100" rx="8" fill="#2d3748" stroke="#9f7aea" stroke-width="2"/>
    <text x="70" y="30" text-anchor="middle" fill="#9f7aea" font-family="system-ui" font-size="24">🔍</text>
    <text x="70" y="55" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">2. Analyze</text>
    <text x="70" y="72" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">Claude Vision</text>
    <text x="70" y="85" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">extracts components</text>
  </g>

  <!-- Arrow -->
  <path d="M365 110 L395 110" stroke="#9f7aea" stroke-width="2" fill="none"/>

  <!-- Step 3: Confirm -->
  <g transform="translate(400, 60)">
    <rect width="140" height="100" rx="8" fill="#2d3748" stroke="#f6ad55" stroke-width="2"/>
    <text x="70" y="30" text-anchor="middle" fill="#f6ad55" font-family="system-ui" font-size="24">✏️</text>
    <text x="70" y="55" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">3. Confirm</text>
    <text x="70" y="72" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">Review &amp; modify</text>
    <text x="70" y="85" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">detected components</text>
  </g>

  <!-- Arrow -->
  <path d="M545 110 L575 110" stroke="#f6ad55" stroke-width="2" fill="none"/>

  <!-- Step 4: Generate -->
  <g transform="translate(580, 60)">
    <rect width="140" height="100" rx="8" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
    <text x="70" y="30" text-anchor="middle" fill="#48bb78" font-family="system-ui" font-size="24">⚙️</text>
    <text x="70" y="55" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">4. Generate</text>
    <text x="70" y="72" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">Terraform code</text>
    <text x="70" y="85" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">with validation</text>
  </g>

  <!-- Example components box -->
  <g transform="translate(220, 180)">
    <rect width="500" height="80" rx="8" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
    <text x="20" y="25" fill="#68d391" font-family="monospace" font-size="11">Detected: AWS</text>
    <text x="20" y="42" fill="#a0aec0" font-family="monospace" font-size="10">• EC2 (t3.large) → aws_instance.web</text>
    <text x="20" y="56" fill="#a0aec0" font-family="monospace" font-size="10">• RDS PostgreSQL → aws_db_instance.main</text>
    <text x="20" y="70" fill="#a0aec0" font-family="monospace" font-size="10">• S3 bucket → aws_s3_bucket.assets</text>
    <text x="280" y="42" fill="#a0aec0" font-family="monospace" font-size="10">• VPC with subnets</text>
    <text x="280" y="56" fill="#a0aec0" font-family="monospace" font-size="10">• ALB load balancer</text>
    <text x="280" y="70" fill="#a0aec0" font-family="monospace" font-size="10">• CloudWatch monitoring</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#63b3ed"/>
    </marker>
  </defs>
</svg>
