<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="1" />
      <stop offset="100%" stop-color="#16213e" stop-opacity="1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" rx="10"/>

  <!-- Stage 1: Clarify -->
  <g transform="translate(50, 60)">
    <rect width="120" height="80" rx="8" fill="#4a5568" stroke="#63b3ed" stroke-width="2"/>
    <text x="60" y="35" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">Clarify</text>
    <text x="60" y="55" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">Gather</text>
    <text x="60" y="67" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">requirements</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M175 100 L205 100" stroke="#63b3ed" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Stage 2: Code Gen -->
  <g transform="translate(210, 60)">
    <rect width="120" height="80" rx="8" fill="#4a5568" stroke="#68d391" stroke-width="2"/>
    <text x="60" y="35" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">Code Gen</text>
    <text x="60" y="55" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">Generate</text>
    <text x="60" y="67" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">Terraform</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M335 100 L365 100" stroke="#68d391" stroke-width="2" fill="none"/>

  <!-- Stage 3: Validate -->
  <g transform="translate(370, 60)">
    <rect width="120" height="80" rx="8" fill="#4a5568" stroke="#f6ad55" stroke-width="2"/>
    <text x="60" y="35" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">Validate</text>
    <text x="60" y="55" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">fmt, init,</text>
    <text x="60" y="67" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">validate, plan</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M495 100 L525 100" stroke="#f6ad55" stroke-width="2" fill="none"/>

  <!-- Stage 4: Cost -->
  <g transform="translate(530, 60)">
    <rect width="120" height="80" rx="8" fill="#4a5568" stroke="#9f7aea" stroke-width="2"/>
    <text x="60" y="35" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">Cost</text>
    <text x="60" y="55" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">Estimate with</text>
    <text x="60" y="67" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">Infracost</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M655 100 L685 100" stroke="#9f7aea" stroke-width="2" fill="none"/>

  <!-- Stage 5: Done -->
  <g transform="translate(690, 75)">
    <circle r="25" fill="#48bb78" stroke="#fff" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18">✓</text>
  </g>

  <!-- Security Badge (optional) -->
  <g transform="translate(370, 155)">
    <rect width="120" height="25" rx="12" fill="#2d3748" stroke="#fc8181" stroke-width="1" stroke-dasharray="4"/>
    <text x="60" y="17" text-anchor="middle" fill="#fc8181" font-family="system-ui" font-size="10">Security (manual)</text>
  </g>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#63b3ed"/>
    </marker>
  </defs>
</svg>
